project:
  type: book
  output-dir: _book

book:
  title: "Bio196-22 Computing for Bioinformatics"
  subtitle: "Linux, HPC, environments, workflows, and reproducible analysis"
  author:
    - name: "Yucheng Zhang"
      affiliation: "Tufts University"
    - name: "Shirley Li"
      affiliation: "Tufts University"
  date: today
  chapters:
    - index.qmd
    - preface.qmd
    - part: "Week 1: Linux Basics and Text Editing"
      chapters:
        - chapters/01-linux-shell-basics.qmd
        - chapters/02-text-editing.qmd
        - chapters/03-file-manipulation.qmd
        - chapters/04-text-processing.qmd
        - chapters/05-shell-scripting.qmd
    - part: "Week 2: SSH and High-Performance Computing"
      chapters:
        - chapters/06-hpc.qmd
    - part: "Week 3: Conda and Containers"
      chapters:
        - chapters/07-conda.qmd
        - chapters/08-docker.qmd
        - chapters/09-apptainer.qmd
    - part: "Week 4: NGS and RNA-seq"
      chapters:
        - chapters/10-ngs-sequencing.qmd
        - chapters/11-rnaseq.qmd
    - part: "Week 5: Nextflow and nf-core"
      chapters:
        - chapters/12-workflow-managers.qmd
        - chapters/13-nextflow.qmd
        - chapters/14-nfcore.qmd
        - chapters/15-nfcore-rnaseq.qmd
    - part: "Week 6: Version Control and Reproducible Reports"
      chapters:
        - chapters/16-version-control.qmd
        - chapters/17-reproducible-reports.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: false
    code-tools: true
    code-overflow: wrap
    highlight-style: github
  pdf:
    documentclass: scrreprt
    toc: true
    number-sections: true
    colorlinks: true
